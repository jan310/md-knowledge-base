authorization-server:
  domain: ${AUTH_SERVER_DOMAIN}
  client-id: ${AUTH_SERVER_CLIENT_ID}
  client-secret: ${AUTH_SERVER_CLIENT_SECRET}

google-gemini:
  api-key: ${GOOGLE_GEMINI_API_KEY}
  model: gemini-3.1-flash-lite

spring:
  application:
    name: md-knowledge-base
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_ADDRESS}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          starttls:
            enable: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI}
          audiences: ${OAUTH2_AUDIENCE}
  threads:
    virtual:
      enabled: true
